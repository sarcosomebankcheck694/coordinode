name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include example queries or API if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Query Engine (OpenCypher)
        - Vector Search (HNSW)
        - Full-Text Search
        - Storage Engine
        - API (gRPC/REST/GraphQL)
        - Operations (metrics, backup, CLI)
        - Documentation
        - Other
    validations:
      required: true
