# CoordiNode REST proxy configuration for structured-proxy.
#
# Transcodes gRPC services (port 7080) to REST/JSON (port 7081)
# using google.api.http annotations from proto descriptors.
#
# Usage (local dev):
#   structured-proxy --config coordinode-proxy.yaml

service:
  name: coordinode

listen:
  http: "0.0.0.0:7081"

upstream:
  default: "http://127.0.0.1:7080"

descriptors:
  - file: "coordinode.descriptor.bin"

logging:
  level: "info"
  format: "json"
