# Nextest configuration for coordinode
# See https://nexte.st/docs/configuration/

[store]
dir = "target/nextest"

[profile.default]
fail-fast = false

[profile.default.slow-timeout]
period = "30s"

# Raft cluster tests: serial execution.
# Each test spawns 3 tokio runtimes with gRPC servers — heavy on CPU and
# timing-sensitive (leader election 300-600ms). Parallel runs cause flaky
# failures from resource contention. Ports are random (bind :0) so no
# port conflicts, but CPU contention makes elections timeout.
[[profile.default.overrides]]
filter = "binary(raft_cluster)"
threads-required = 1
test-group = "serial-raft"

[test-groups.serial-raft]
max-threads = 1

# CI profile: same as default but with JUnit output
[profile.ci]
fail-fast = false

[profile.ci.slow-timeout]
period = "60s"

[profile.ci.junit]
path = "junit.xml"

[[profile.ci.overrides]]
filter = "binary(raft_cluster)"
threads-required = 1
test-group = "serial-raft"
